<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sign In — MFC Food Shop</title>
  <link rel="stylesheet" href="/css/style.css">
  <link rel="stylesheet" href="/css/responsive.css">
</head>
<body>
  <div class="auth-page">
    <div class="auth-card">
      <div class="auth-logo">
        <a href="/" class="auth-logo">
          <div class="logo-icon">🍽</div>
        </a>
        <h2>Welcome Back</h2>
        <p>Sign in to your MFC Food Shop account</p>
      </div>

      <div id="loginError" style="display:none;background:#FEE2E2;color:#991B1B;padding:12px 16px;border-radius:8px;font-size:.875rem;margin-bottom:16px"></div>

      <form id="loginForm">
        <div class="form-group">
          <label class="form-label" for="loginEmail">Email Address</label>
          <input type="email" class="form-control" id="loginEmail" required placeholder="your@email.com">
          <span class="form-error" data-for="loginEmail"></span>
        </div>
        <div class="form-group">
          <label class="form-label" for="loginPassword">Password</label>
          <input type="password" class="form-control" id="loginPassword" required placeholder="••••••••">
          <span class="form-error" data-for="loginPassword"></span>
        </div>
        <button type="submit" class="btn btn-primary" style="width:100%;justify-content:center;margin-top:8px">Sign In</button>
      </form>

      <div class="auth-divider"><span>or</span></div>

      <div style="background:var(--gray-50);border-radius:8px;padding:14px;font-size:.8rem;color:var(--gray-500);margin-bottom:16px">
        <strong>Demo Accounts:</strong><br>
        Admin: admin@mfcfood.com / admin123<br>
        Customer: john@example.com / pass123
      </div>

      <div class="auth-footer">
        Don't have an account? <a href="/register">Create one free</a>
      </div>
    </div>
  </div>

  <script src="/js/app.js"></script>
  <script src="/js/auth.js"></script>
</body>
</html>
