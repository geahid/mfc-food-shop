<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Orders — MFC Food Shop</title>
  <link rel="stylesheet" href="/css/style.css">
  <link rel="stylesheet" href="/css/responsive.css">
</head>
<body>
  <nav class="navbar">
    <div class="container navbar-inner">
      <a href="/" class="navbar-logo"><div class="logo-icon">🍽</div><span class="logo-text">MFC <span>Food</span></span></a>
      <div class="navbar-nav">
        <a href="/" class="nav-link">Home</a><a href="/menu" class="nav-link">Menu</a>
        <a href="/orders" class="nav-link active">Orders</a><a href="/profile" class="nav-link">Profile</a>
      </div>
      <div class="navbar-actions">
        <button id="cartBtn" class="cart-btn">🛒<span class="cart-badge" id="cartBadge" style="display:none">0</span></button>
        <a href="/login" id="loginBtn" class="btn btn-primary btn-sm">Sign In</a>
        <button id="userBtn" class="btn btn-outline btn-sm" style="display:none"></button>
        <button id="mobileMenuBtn" class="mobile-menu-btn">☰</button>
      </div>
    </div>
  </nav>
  <div id="mobileNav" class="mobile-nav">
    <a href="/" class="nav-link">Home</a><a href="/menu" class="nav-link">Menu</a>
    <a href="/orders" class="nav-link active">Orders</a><a href="/profile" class="nav-link">Profile</a>
  </div>

  <div class="page-content">
    <!-- Order Success Banner -->
    <div id="successBanner" style="display:none;background:linear-gradient(135deg,#10B981,#059669);color:white;padding:32px 0">
      <div class="container text-center">
        <div style="font-size:2.5rem;margin-bottom:12px">🎉</div>
        <h2 style="color:white;margin-bottom:8px">Order Placed Successfully!</h2>
        <p style="opacity:.85;margin-bottom:4px">Your delicious food is being prepared</p>
        <p id="successOrderId" style="opacity:.7;font-size:.875rem"></p>
      </div>
    </div>

    <div class="page-header">
      <div class="container">
        <div class="breadcrumb"><a href="/">Home</a><span class="breadcrumb-sep">›</span>Orders</div>
        <h1>My Orders</h1>
        <p>Track and manage your orders</p>
      </div>
    </div>

    <section class="section">
      <div class="container">
        <div id="ordersContainer"><div class="loading"><div class="spinner"></div></div></div>
      </div>
    </section>
  </div>

  <footer class="footer"><div class="container"><div class="footer-bottom"><span>© 2025 MFC Food Shop</span></div></div></footer>

  <div id="cartOverlay" class="cart-overlay"></div>
  <div id="cartSidebar" class="cart-sidebar">
    <div class="cart-header"><h3>🛒 Cart</h3><button id="cartClose" class="cart-close">✕</button></div>
    <div id="cartItems" class="cart-items"></div>
    <div id="cartFooter" class="cart-footer" style="display:none">
      <div id="cartTotals" class="cart-totals"></div>
      <a href="/checkout" class="btn btn-primary" style="width:100%;justify-content:center">Checkout →</a>
    </div>
  </div>

  <script src="/js/app.js"></script>
  <script>
    const STATUS_STEPS = ['pending','confirmed','preparing','ready','delivered'];

    function getStepIndex(status) {
      return STATUS_STEPS.indexOf(status);
    }

    function renderTracking(status) {
      const current = getStepIndex(status);
      const labels = ['Order Placed','Confirmed','Preparing','Ready','Delivered'];
      const icons = ['📋','✅','👨‍🍳','🍱','🚗'];
      if (status === 'cancelled') return `<div style="text-align:center;padding:20px;color:var(--red);font-weight:600">❌ Order Cancelled</div>`;
      return `<div class="order-steps">${STATUS_STEPS.map((s, i) => `
        <div class="step ${i < current ? 'done' : i === current ? 'active' : ''}">
          <div class="step-icon">${i <= current ? (i < current ? '✓' : icons[i]) : icons[i]}</div>
          <div class="step-label">${labels[i]}</div>
        </div>
      `).join('')}</div>`;
    }

    document.addEventListener('DOMContentLoaded', async () => {
      // Show success banner
      const params = new URLSearchParams(window.location.search);
      if (params.get('success') === '1') {
        const banner = document.getElementById('successBanner');
        banner.style.display = 'block';
        const id = params.get('id');
        if (id) document.getElementById('successOrderId').textContent = `Order ID: #${id}`;
      }

      const user = Auth.getUser();
      const container = document.getElementById('ordersContainer');

      if (!user) {
        container.innerHTML = `
          <div class="empty-state">
            <div class="icon">🔐</div>
            <h3>Sign in to view orders</h3>
            <p>You need to be logged in to see your order history</p>
            <a href="/login" class="btn btn-primary">Sign In</a>
          </div>`;
        return;
      }

      try {
        const orders = await API.get(`/api/orders?userId=${user.id}`);
        if (orders.length === 0) {
          container.innerHTML = `
            <div class="empty-state">
              <div class="icon">📦</div>
              <h3>No orders yet</h3>
              <p>You haven't placed any orders. Start exploring our menu!</p>
              <a href="/menu" class="btn btn-primary">Browse Menu</a>
            </div>`;
          return;
        }

        container.innerHTML = orders.map(o => `
          <div style="background:var(--bg-card);border-radius:var(--radius-lg);border:1px solid var(--border);margin-bottom:20px;overflow:hidden">
            <!-- Order Header -->
            <div style="padding:20px 24px;display:flex;align-items:center;justify-content:space-between;border-bottom:1px solid var(--gray-100);flex-wrap:wrap;gap:12px">
              <div>
                <div style="display:flex;align-items:center;gap:10px">
                  <strong style="font-size:1rem">#${o.id}</strong>
                  <span class="status-badge status-${o.status}">${o.status.charAt(0).toUpperCase()+o.status.slice(1)}</span>
                </div>
                <div style="font-size:.8rem;color:var(--text-secondary);margin-top:4px">${new Date(o.createdAt).toLocaleString('en-US',{month:'long',day:'numeric',year:'numeric',hour:'2-digit',minute:'2-digit'})}</div>
              </div>
              <div style="text-align:right">
                <div style="font-size:1.2rem;font-weight:700;font-family:'Playfair Display',serif">$${o.total.toFixed(2)}</div>
                <div style="font-size:.78rem;color:var(--text-secondary)">${o.items.length} item(s)</div>
              </div>
            </div>

            <!-- Tracking -->
            ${renderTracking(o.status)}

            <!-- Items -->
            <div style="padding:0 24px 20px">
              <div style="font-size:.8rem;font-weight:600;text-transform:uppercase;letter-spacing:.05em;color:var(--text-secondary);margin-bottom:12px">Items</div>
              ${o.items.map(item => `
                <div style="display:flex;align-items:center;gap:12px;padding:8px 0;border-top:1px solid var(--gray-100)">
                  <img src="${item.image}" alt="${item.name}" style="width:44px;height:44px;border-radius:8px;object-fit:cover" onerror="this.src='https://images.unsplash.com/photo-1546793665-c74683f339c1?w=100&fit=crop'">
                  <div style="flex:1">
                    <div style="font-weight:600;font-size:.875rem">${item.name}</div>
                    <div style="font-size:.78rem;color:var(--text-secondary)">× ${item.quantity}</div>
                  </div>
                  <div style="font-weight:600;font-size:.875rem">$${(item.price * item.quantity).toFixed(2)}</div>
                </div>
              `).join('')}
              <div style="margin-top:16px;font-size:.85rem;color:var(--text-secondary)">
                📍 Delivered to: ${o.address}
              </div>
            </div>
          </div>
        `).join('');
      } catch { container.innerHTML = '<p style="color:var(--text-secondary);text-align:center;padding:40px">Failed to load orders</p>'; }
    });
  </script>
</body>
</html>
